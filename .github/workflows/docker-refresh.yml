name: Publish Daily Refresh Image

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: daily-refresh-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  VALIDATE_REQUIREMENTS: requirements-full.txt

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sync dependencies
        run: uv sync

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ env.VALIDATE_REQUIREMENTS }}
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration

  refresh:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            requirements: requirements-minimal.txt
          - variant: base
            requirements: requirements-base.txt
          - variant: extended
            requirements: requirements-extended.txt
          - variant: full
            requirements: requirements-full.txt
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        run: echo "name=${GHCR_IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Set refresh date tag
        id: date
        run: echo "tag=$(date -u +'%y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.variant }} refresh image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ matrix.requirements }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ matrix.variant }}-${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=docker-image-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
          provenance: false
          sbom: true

      - name: Attest ${{ matrix.variant }} refresh image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
