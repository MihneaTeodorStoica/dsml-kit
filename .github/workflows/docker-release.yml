name: Publish Release Container Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-container-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            requirements: requirements-minimal.txt
          - variant: base
            requirements: requirements-base.txt
          - variant: extended
            requirements: requirements-extended.txt
          - variant: full
            requirements: requirements-full.txt
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag {tag!r} does not match pyproject version {version!r}; expected {expected!r}.")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        run: echo "name=${GHCR_IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.variant }} image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ matrix.requirements }}
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ matrix.variant }}
            ${{ steps.image.outputs.name }}:${{ matrix.variant }}-${{ github.sha }}
          cache-from: type=gha,scope=docker-image-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
          provenance: false
          sbom: true

      - name: Attest ${{ matrix.variant }} image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
