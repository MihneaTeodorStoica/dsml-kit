name: Publish Release Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=minimal,enable={{is_default_branch}}
            type=raw,value=gpu,enable={{is_default_branch}}
            type=raw,value=full,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: mode=max
          sbom: true
