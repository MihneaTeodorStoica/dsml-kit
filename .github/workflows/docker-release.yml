name: Publish Release Container Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  VALIDATE_REQUIREMENTS: requirements-full.txt

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ env.VALIDATE_REQUIREMENTS }}
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            requirements: requirements-minimal.txt
          - variant: base
            requirements: requirements-base.txt
          - variant: extended
            requirements: requirements-extended.txt
          - variant: full
            requirements: requirements-full.txt
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }} image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ matrix.requirements }}
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.variant }}
            ${{ env.GHCR_IMAGE }}:${{ matrix.variant }}-${{ github.sha }}
          cache-from: type=gha,scope=docker-image-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
          provenance: mode=max
          sbom: true
