name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  python-package:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Check CLI help
        run: uv run dsml --help

      - name: Check config init
        run: uv run dsml init --profile minimal --force

  docker-image:
    runs-on: ubuntu-latest
    needs: python-package
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sync dependencies
        run: uv sync

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base/Dockerfile
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration
