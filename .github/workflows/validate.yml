name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  VALIDATE_REQUIREMENTS: requirements-full.txt

jobs:
  python-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Check CLI help
        run: uv run dsml --help

      - name: Check config init
        run: uv run dsml init --profile minimal --force

      - name: Build package
        run: uv build

  docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sync dependencies
        run: uv sync

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ env.VALIDATE_REQUIREMENTS }}
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration

  release-images:
    runs-on: ubuntu-latest
    needs:
      - python-package
      - docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            requirements: requirements-minimal.txt
          - variant: base
            requirements: requirements-base.txt
          - variant: extended
            requirements: requirements-extended.txt
          - variant: full
            requirements: requirements-full.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify ${{ matrix.variant }} release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ matrix.requirements }}
          outputs: type=cacheonly
          push: false
          cache-from: type=gha,scope=docker-image-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-image-${{ matrix.variant }}
          provenance: false

  release:
    runs-on: ubuntu-latest
    needs:
      - python-package
      - docker-image
      - release-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read project version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Check release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            git fetch --depth=1 origin "refs/tags/$TAG:refs/tags/$TAG"
            tag_target=$(git rev-list -n 1 "$TAG")
            echo "tag_target=$tag_target" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify existing release tag
        if: steps.release_state.outputs.tag_exists == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TAG_TARGET: ${{ steps.release_state.outputs.tag_target }}
        run: |
          if [ "$TAG_TARGET" != "$GITHUB_SHA" ]; then
            echo "Release tag $TAG already exists at $TAG_TARGET, not the verified commit $GITHUB_SHA." >&2
            exit 1
          fi

      - name: Create release tag
        if: steps.release_state.outputs.release_exists == 'false' && steps.release_state.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Verify created release tag
        if: steps.release_state.outputs.release_exists == 'false' && steps.release_state.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --depth=1 origin "refs/tags/$TAG:refs/tags/$TAG"
          tag_target=$(git rev-list -n 1 "$TAG")
          if [ "$tag_target" != "$GITHUB_SHA" ]; then
            echo "Release tag $TAG resolves to $tag_target, not the verified commit $GITHUB_SHA." >&2
            exit 1
          fi

      - name: Dispatch package publishing
        if: steps.release_state.outputs.release_exists == 'false' && steps.release_state.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run pypi-publish.yml --ref "$TAG"
          gh workflow run docker-release.yml --ref "$TAG"
