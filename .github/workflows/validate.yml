name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  VALIDATE_REQUIREMENTS: requirements-full.txt

jobs:
  python-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Check CLI help
        run: uv run dsml --help

      - name: Check config init
        run: uv run dsml init --profile minimal --force

  docker-image:
    runs-on: ubuntu-latest
    needs: python-package

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Sync dependencies
        run: uv sync

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/base/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            DSML_REQUIREMENTS=${{ env.VALIDATE_REQUIREMENTS }}
          load: true
          push: false
          tags: dsml-kit:validate
          cache-from: type=gha,scope=docker-image
          cache-to: type=gha,mode=max,scope=docker-image
          provenance: false

      - name: Run integration tests
        run: DSML_TEST_IMAGE=dsml-kit:validate uv run pytest tests/integration

  release:
    runs-on: ubuntu-latest
    needs:
      - python-package
      - docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: write
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read project version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          print(f"version={version}")
          print(f"tag=v{version}")
          PY

      - name: Check release state
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and tag
        if: steps.release_state.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes

      - name: Dispatch package publishing
        if: steps.release_state.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh workflow run pypi-publish.yml --ref "$TAG"
          gh workflow run docker-release.yml --ref "$TAG"
