name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=raw,value={{date 'YYYY-MM-DD'}}

       - name: Build and push image
         id: build
         uses: docker/build-push-action@v6
         with:
           context: .
           push: true
           tags: ${{ steps.meta.outputs.tags }}
           labels: ${{ steps.meta.outputs.labels }}
           cache-from: type=gha,scope=docker-image
           cache-to: type=gha,mode=max,scope=docker-image
           provenance: mode=max
           sbom: true

       - name: Attest build provenance
         uses: actions/attest-build-provenance@v1
         with:
           image-ref: ${{ steps.build.outputs.image }}@${{ steps.build.outputs.digest }}
           push: true

       - name: Run Docker Scout
         uses: docker/scout-action@v1
         with:
           command: quickview
           image: ${{ env.GHCR_IMAGE }}

       - name: Run Docker Scout CVEs
         uses: docker/scout-action@v1
         with:
           command: cves
           image: ${{ env.GHCR_IMAGE }}
           format: sarif
           output: cves.sarif

       - name: Upload SARIF file
         uses: github/codeql-action/upload-sarif@v3
         with:
           sarif_file: cves.sarif
